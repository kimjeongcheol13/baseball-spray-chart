name: ✨ 기능 추가 요청 (Claude 자동 처리)
description: 원하는 기능을 설명하면 Claude Code가 자동으로 구현합니다
title: "[FEAT] "
labels: ["enhancement", "claude"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🤖 이 이슈는 Claude Code가 자동으로 처리합니다

  - type: textarea
    id: feature
    attributes:
      label: ✨ 원하는 기능
      description: 어떤 기능이 필요한가요?
      placeholder: |
        예) 타석 기록 시 타구 유형(라인드라이브/플라이볼/땅볼)을 선택할 수 있게 해줘
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: 💡 필요한 이유
      placeholder: |
        예) 타구 유형별 통계를 보고 싶어서
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 📎 참고 자료 (선택)
      description: 비슷한 기능의 예시나 참고 링크
