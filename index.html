<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Baseball Spray Chart v2</title>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --accent: #58a6ff;
            /* 타구 결과별 색상 */
            --color-hit: #44CC66;
            --color-extra: #FFCC44;
            --color-homerun: #FF5555;
            --color-out: #8b949e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            display: flex; flex-direction: column; height: 100vh;
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        /* 헤더 스타일 */
        .hdr {
            padding: 10px 20px; background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .hdr h1 { font-size: 16px; color: var(--accent); }

        .main { display: flex; flex: 1; overflow: hidden; }

        /* 필드 및 캔버스 */
        .center-col {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
            background: #0d1117;
        }

        #canvas-wrapper { position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { display: block; background: #1a2e1a; cursor: crosshair; touch-action: none; }

        /* 컨트롤 패널 */
        .right-panel {
            width: 300px; background: var(--panel);
            border-left: 1px solid var(--border);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            overflow-y: auto;
        }

        .section-label { font-size: 11px; color: #8b949e; font-weight: 600; text-transform: uppercase; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button {
            padding: 10px; border-radius: 6px; border: 1px solid var(--border);
            background: #21262d; color: var(--text); font-weight: 600; cursor: pointer;
        }
        button:hover { background: #30363d; }
        button.active { border-color: var(--accent); background: #1c2d3d; }

        .btn-save { background: #238636; border: none; }
        .btn-save:hover { background: #2ea043; }

        /* 모달/알림 */
        #status-msg { margin-top: 10px; font-size: 13px; color: var(--accent); min-height: 1.2em; }
    </style>
</head>
<body>

<div class="hdr">
    <h1>⚾ Pro Spray Analyzer</h1>
    <div style="display:flex; gap:8px;">
        <button onclick="downloadImage()" style="font-size:12px; padding:5px 10px;">📸 이미지 저장</button>
        <button onclick="clearData()" style="font-size:12px; padding:5px 10px; color:#f85149;">🗑️ 초기화</button>
    </div>
</div>

<div class="main">
    <div class="center-col">
        <div id="canvas-wrapper">
            <canvas id="sprayCanvas" width="500" height="500"></canvas>
        </div>
        <div id="status-msg">결과를 선택하고 필드를 클릭하세요.</div>
    </div>

    <div class="right-panel">
        <div>
            <div class="section-label">1. 타구 결과</div>
            <div class="btn-group" id="outcome-btns">
                <button onclick="setOutcome('single', this)" style="color:var(--color-hit)">단타</button>
                <button onclick="setOutcome('extra', this)" style="color:var(--color-extra)">장타</button>
                <button onclick="setOutcome('homerun', this)" style="color:var(--color-homerun)">홈런</button>
                <button onclick="setOutcome('out', this)" style="color:var(--color-out)">아웃</button>
            </div>
        </div>

        <div>
            <div class="section-label">2. 타구 궤적</div>
            <div class="btn-group" id="traj-btns">
                <button onclick="setTraj('GB', this)">땅볼</button>
                <button onclick="setTraj('LD', this)">라인드라이브</button>
                <button onclick="setTraj('FB', this)">플라이</button>
                <button onclick="setTraj('PU', this)">팝업</button>
            </div>
        </div>

        <hr style="border:0; border-top:1px solid var(--border); margin:10px 0;">

        <button class="btn-save" onclick="saveRecord()">타석 기록 확정</button>
        <button onclick="toggleHeatmap()" id="heatmapBtn">🌡️ 히트맵 모드: OFF</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('sprayCanvas');
    const ctx = canvas.getContext('2d');
    const statusMsg = document.getElementById('status-msg');

    // 상태 변수
    let pas = JSON.parse(localStorage.getItem('baseball_data')) || [];
    let currentOutcome = null;
    let currentTraj = null;
    let isHeatmap = false;

    // 초기화
    function init() {
        drawField();
        renderDots();
    }

    // 결과/궤적 선택
    function setOutcome(val, btn) {
        currentOutcome = val;
        setActive(btn, 'outcome-btns');
    }

    function setTraj(val, btn) {
        currentTraj = val;
        setActive(btn, 'traj-btns');
    }

    function setActive(targetBtn, parentId) {
        document.querySelectorAll(`#${parentId} button`).forEach(b => b.classList.remove('active'));
        targetBtn.classList.add('active');
    }

    // 캔버스 클릭 이벤트 (3. 모바일 정확도 보정)
    canvas.addEventListener('click', (e) => {
        if (!currentOutcome) {
            statusMsg.textContent = "⚠️ 타구 결과를 먼저 선택해 주세요!";
            return;
        }
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width; // 0 ~ 1 사이 비율로 저장
        const y = (e.clientY - rect.top) / rect.height;

        addPoint(x, y);
    });

    function addPoint(x, y) {
        const newPA = {
            x, y,
            outcome: currentOutcome,
            traj: currentTraj,
            date: new Date().toISOString()
        };
        pas.push(newPA);
        saveToLocal();
        drawField();
        renderDots();
        statusMsg.textContent = "✅ 기록되었습니다.";
    }

    // 데이터 관리 (4. 저장 기능)
    function saveToLocal() {
        localStorage.setItem('baseball_data', JSON.stringify(pas));
    }

    function clearData() {
        if(confirm("모든 데이터를 삭제할까요?")) {
            pas = [];
            saveToLocal();
            drawField();
            renderDots();
        }
    }

    // 시각화 로직 (1. 결과 분류 & 2. 히트맵)
    function drawField() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // 야구장 베이스 라인 그리기 (간략화)
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(250, 450); ctx.lineTo(50, 250); // 3루 라인
        ctx.moveTo(250, 450); ctx.lineTo(450, 250); // 1루 라인
        ctx.stroke();
    }

    function renderDots() {
        if (isHeatmap) {
            drawHeatmap();
        }

        pas.forEach(p => {
            const px = p.x * canvas.width;
            const py = p.y * canvas.height;
            
            ctx.beginPath();
            ctx.arc(px, py, 6, 0, Math.PI * 2);
            ctx.fillStyle = getOutcomeColor(p.outcome);
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 1;
            ctx.stroke();
        });
    }

    function getOutcomeColor(out) {
        switch(out) {
            case 'single': return '#44CC66';
            case 'extra': return '#FFCC44';
            case 'homerun': return '#FF5555';
            default: return '#8b949e';
        }
    }

    // 2. 히트맵 기능
    function drawHeatmap() {
        pas.forEach(p => {
            const px = p.x * canvas.width;
            const py = p.y * canvas.height;
            const grad = ctx.createRadialGradient(px, py, 0, px, py, 40);
            grad.addColorStop(0, 'rgba(255, 171, 0, 0.3)');
            grad.addColorStop(1, 'rgba(255, 171, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(px-40, py-40, 80, 80);
        });
    }

    function toggleHeatmap() {
        isHeatmap = !isHeatmap;
        document.getElementById('heatmapBtn').textContent = `🌡️ 히트맵 모드: ${isHeatmap ? 'ON' : 'OFF'}`;
        drawField();
        renderDots();
    }

    // 5. 공유 기능 (이미지 다운로드)
    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'spray_chart.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    init();
</script>

</body>
</html>
