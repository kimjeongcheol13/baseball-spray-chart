<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Baseball Spray Chart</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --border:#30363d;--text:#e6edf3;--muted:#8b949e;
  --blue:#58a6ff;--orange:#f0883e;--green:#44CC66;--red:#f85149;
  --accent:#1f6feb;
}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;-webkit-tap-highlight-color:transparent}
input,button,select{font-family:inherit;font-size:13px}
button{cursor:pointer;border:none;border-radius:5px;padding:4px 10px;transition:all 0.15s}
input[type=text],input[type=date]{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:3px 7px;outline:none}
input[type=text]:focus,input[type=date]:focus{border-color:var(--blue)}

/* HEADER */
.hdr{flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg2);padding:7px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.score-block{display:flex;align-items:center;gap:5px}
.team-name{width:80px;font-weight:600}
.score-btn{background:var(--bg3);color:var(--text);border:1px solid var(--border);width:26px;height:26px;border-radius:5px;font-size:15px;display:flex;align-items:center;justify-content:center}
.score-btn:hover{background:var(--border)}
.score-val{font-size:20px;font-weight:800;min-width:30px;text-align:center}
.vs{font-weight:700;color:var(--muted);font-size:14px;padding:0 2px}
.hdr-right{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap;align-items:center}
.btn-icon{background:var(--bg3);color:var(--muted);border:1px solid var(--border);font-size:11px;padding:4px 9px;border-radius:5px}
.btn-icon:hover{background:var(--border);color:var(--text)}
.btn-save{background:#238636;color:#fff;border:1px solid #2ea043;padding:4px 12px;font-weight:600}
.btn-save:hover{background:#2ea043}

/* MAIN */
.main{flex:1;display:flex;overflow:hidden;min-height:0}

/* LEFT */
.left-panel{width:195px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--border);background:var(--bg2)}
.team-hdr{padding:7px 9px;font-weight:700;font-size:11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:5px;letter-spacing:.3px;text-transform:uppercase}
.batter-row{display:flex;align-items:center;gap:4px;padding:4px 7px;border-bottom:1px solid #1a1f26;cursor:pointer;transition:background 0.1s;position:relative}
.batter-row:hover{background:var(--bg3)}
.batter-row.active{background:#162032}
.batter-row.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--blue);border-radius:0 2px 2px 0}
.batter-num{width:15px;font-size:10px;color:var(--muted);flex-shrink:0;text-align:center}
.batter-inp{flex:1;min-width:0;background:transparent;border:none;color:var(--text);padding:1px 2px;font-size:12px}
.batter-inp:focus{outline:none;background:var(--bg);border-radius:3px;padding:1px 4px}
.hand-btn{flex-shrink:0;font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text);letter-spacing:.3px}
.hand-btn.L{background:#1c3a2d;color:#44cc66;border-color:#44cc6666}
.hand-btn.R{background:#2d1c1c;color:#ff5555;border-color:#ff555566}

/* CENTER */
.center{flex-shrink:0;display:flex;flex-direction:column;padding:10px;gap:7px;background:var(--bg);align-items:center}
#fieldCanvas{display:block;cursor:crosshair;border-radius:6px;touch-action:none;box-shadow:0 0 0 1px var(--border)}
.canvas-bar{width:480px;display:flex;gap:6px;align-items:center}
.status{flex:1;padding:5px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg2);font-size:12px;color:var(--muted);text-align:center;transition:all 0.2s}
.status.hot{border-color:var(--red);color:var(--red)}
.btn-hm{background:var(--bg3);color:var(--muted);border:1px solid var(--border);font-size:11px;padding:5px 9px;border-radius:5px;white-space:nowrap}
.btn-hm.on{background:#162032;color:var(--blue);border-color:var(--blue)}
.btn-png{background:var(--bg3);color:var(--muted);border:1px solid var(--border);font-size:11px;padding:5px 9px;border-radius:5px}
.btn-png:hover{color:var(--text);background:var(--border)}
.rbi-bar{width:480px;display:none;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:7px 12px}
.rbi-bar.on{display:flex}
.rbi-lbl{font-size:12px;color:var(--muted)}
.cnt-btn{background:var(--bg3);color:var(--text);border:1px solid var(--border);width:24px;height:24px;border-radius:4px;font-size:15px;display:flex;align-items:center;justify-content:center}
.rbi-v{min-width:22px;text-align:center;font-weight:700;font-size:14px}
.run-chk{accent-color:var(--blue)}
.btn-ok{background:#238636;color:#fff;border:1px solid #2ea043;padding:3px 12px;font-weight:600;border-radius:5px}
.btn-ok:hover{background:#2ea043}
.btn-cx{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:3px 10px;border-radius:5px}

/* RIGHT */
.right{width:250px;flex-shrink:0;overflow-y:auto;border-left:1px solid var(--border);display:flex;flex-direction:column;gap:9px;padding:11px;background:var(--bg2)}
.sec-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.pitch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.p-btn{padding:5px 2px;border-radius:4px;font-size:11px;font-weight:700;border:2px solid transparent;transition:all 0.12s}
.p-btn:hover{filter:brightness(1.2)}
.zone-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.zone-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.z-cell{background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:6px 0;text-align:center;font-size:10px;cursor:pointer;color:var(--muted);transition:all 0.1s}
.z-cell:hover{background:var(--border);color:var(--text)}
.z-cell.on{background:#162032;border-color:var(--blue);color:var(--blue)}
.btn-clr{background:var(--bg3);color:var(--muted);border:1px solid var(--border);font-size:10px;padding:2px 7px;border-radius:4px}
.hit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
.h-btn{padding:6px 4px;border-radius:5px;font-size:12px;font-weight:700;border:2px solid transparent;transition:all 0.12s}
.h-btn:hover{filter:brightness(1.2)}
.traj-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.t-btn{padding:4px 2px;border-radius:4px;font-size:10px;font-weight:700;border:2px solid transparent;transition:all 0.12s;text-align:center}
.t-btn:hover{filter:brightness(1.2)}
.nh-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.nh-btn{padding:5px 2px;border-radius:4px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--bg3);color:var(--text);transition:all 0.12s}
.nh-btn:hover{background:var(--border)}
.log-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
.log-acts{display:flex;gap:4px;margin-bottom:5px}
.log-scr{overflow-y:auto;max-height:145px;border:1px solid var(--border);border-radius:5px}
.log-row{display:flex;align-items:center;gap:4px;padding:3px 7px;border-bottom:1px solid #1a1f26;font-size:11px}
.log-row:last-child{border-bottom:none}
.log-tag{font-weight:700;padding:1px 5px;border-radius:3px;font-size:10px}
.log-del{background:none;border:none;color:var(--muted);font-size:13px;padding:1px 3px;margin-left:auto;border-radius:3px}
.log-del:hover{color:var(--red);background:#2d1c1c}
.log-empty{padding:12px;text-align:center;color:var(--muted);font-size:11px}

/* LEGEND */
.legend{width:480px;display:flex;gap:10px;flex-wrap:wrap;padding:4px 0}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* TOOLTIP */
#canvasTip{position:fixed;background:#161b22ee;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:11px;pointer-events:none;z-index:500;display:none;min-width:110px;line-height:1.7;backdrop-filter:blur(4px)}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:580px;max-width:95vw;max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
.m-hdr{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.m-hdr h3{flex:1;font-size:14px;min-width:0}
.m-close{background:var(--bg3);color:var(--text);border:1px solid var(--border);width:28px;height:28px;border-radius:5px;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.m-close:hover{background:var(--red);color:#fff}
.sb-btn{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:3px 9px;font-size:12px;border-radius:4px}
.sb-btn:hover{background:var(--border)}
.m-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);overflow-x:auto}
.t-tab{padding:8px 15px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;font-size:12px;white-space:nowrap;transition:all 0.15s}
.t-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.m-body{flex:1;overflow-y:auto;padding:13px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.s-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px;text-align:center;transition:background 0.1s}
.s-card:hover{background:#2a313a}
.s-card .sl{font-size:9px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.s-card .sv{font-size:15px;font-weight:800;color:var(--text)}
.pa-tbl{width:100%;border-collapse:collapse;font-size:11px}
.pa-tbl th{background:var(--bg3);padding:5px 6px;border:1px solid var(--border);text-align:center;color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase}
.pa-tbl td{padding:4px 6px;border:1px solid #1a1f26;text-align:center}
.pa-tbl tr:nth-child(even) td{background:var(--bg)}
.an-sec{margin-bottom:16px}
.an-ttl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px}
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.bar-lbl{width:115px;font-size:11px;color:var(--muted);flex-shrink:0}
.bar-trk{flex:1;background:var(--bg3);border-radius:3px;height:13px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.5s cubic-bezier(.4,0,.2,1)}
.bar-pct{width:36px;text-align:right;font-size:11px;font-weight:700;flex-shrink:0}
.ins-box{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:11px;line-height:2.1}
.ins-tag{display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:700;margin:2px}
/* Load */
.load-list{display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto}
.load-item{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:11px;display:flex;align-items:center;gap:8px}
.load-info{flex:1;min-width:0}
.li-title{font-weight:700;margin-bottom:3px;font-size:12px}
.li-meta{font-size:10px;color:var(--muted)}
.btn-ld{background:var(--accent);color:#fff;border:1px solid #388bfd;padding:3px 11px;border-radius:5px;font-size:11px;flex-shrink:0}
.btn-ld:hover{background:#388bfd}
.btn-dd{background:var(--bg3);color:var(--red);border:1px solid var(--red);padding:3px 9px;border-radius:5px;font-size:11px;flex-shrink:0}
.btn-dd:hover{background:#2d1c1c}
/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* Animation */
@keyframes pop{0%{transform:scale(0.3);opacity:0.4}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
.marker-new{animation:pop 0.3s ease-out}
</style>
</head>
<body>

<div class="hdr">
  <div class="score-block">
    <input type="text" class="team-name" id="teamNameA" value="팀 A" style="color:var(--blue);border-color:#58a6ff33">
    <button class="score-btn" onclick="chgScore(0,-1)">−</button>
    <span class="score-val" id="scoreA" style="color:var(--blue)">0</span>
    <button class="score-btn" onclick="chgScore(0,1)">+</button>
  </div>
  <span class="vs">VS</span>
  <div class="score-block">
    <button class="score-btn" onclick="chgScore(1,-1)">−</button>
    <span class="score-val" id="scoreB" style="color:var(--orange)">0</span>
    <button class="score-btn" onclick="chgScore(1,1)">+</button>
    <input type="text" class="team-name" id="teamNameB" value="팀 B" style="color:var(--orange);border-color:#f0883e33">
  </div>
  <input type="date" id="gameDate" style="margin-left:5px">
  <div class="hdr-right">
    <button class="btn-icon" onclick="expCSV()">📊 CSV</button>
    <button class="btn-icon" onclick="expJSON()">📁 JSON</button>
    <button class="btn-icon" onclick="expPNG()">🖼️ PNG</button>
    <button class="btn-icon" onclick="openLoad()">📂 불러오기</button>
    <button class="btn-save" onclick="saveGame()">💾 저장</button>
  </div>
</div>

<div class="main">
  <div class="left-panel" id="leftPanel"></div>

  <div class="center">
    <canvas id="fieldCanvas" width="480" height="480"></canvas>
    <div class="legend" id="legend"></div>
    <div class="canvas-bar">
      <div class="status" id="status">타구 유형을 선택하세요</div>
      <button class="btn-hm" id="hmBtn" onclick="toggleHM()">🌡️ 히트맵</button>
      <button class="btn-png" onclick="expPNG()">💾</button>
    </div>
    <div class="rbi-bar" id="rbiBar">
      <span class="rbi-lbl">타점</span>
      <button class="cnt-btn" onclick="chgRBI(-1)">−</button>
      <span class="rbi-v" id="rbiV">0</span>
      <button class="cnt-btn" onclick="chgRBI(1)">+</button>
      <label style="display:flex;align-items:center;gap:4px;margin-left:8px;font-size:12px">
        <input type="checkbox" id="runChk" class="run-chk"> 득점
      </label>
      <button class="btn-ok" onclick="confirmHit()" style="margin-left:auto">기록 확인</button>
      <button class="btn-cx" onclick="cancelPending()">취소</button>
    </div>
  </div>

  <div class="right" id="rightPanel">
    <div id="curBatterInfo" style="background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 9px;font-size:12px;color:var(--muted)">좌측 라인업에서 타자를 선택하세요</div>
    <div><div class="sec-lbl">투구 종류</div><div class="pitch-grid" id="pitchGrid"></div></div>
    <div>
      <div class="zone-hdr">
        <span class="sec-lbl" style="margin-bottom:0">투구 위치 <span style="font-size:9px;font-weight:400;text-transform:none">(선택)</span></span>
        <button class="btn-clr" onclick="clearZone()">초기화</button>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);padding:0 3px;margin-bottom:3px"><span>내각</span><span>중앙</span><span>외각</span></div>
      <div class="zone-grid" id="zoneGrid"></div>
    </div>
    <div><div class="sec-lbl">타구 유형 <span style="font-size:9px;font-weight:400;text-transform:none">(필드 클릭)</span></div><div class="hit-grid" id="hitGrid"></div></div>
    <div><div class="sec-lbl">타구 궤적 <span style="font-size:9px;font-weight:400;text-transform:none">(선택)</span></div><div class="traj-grid" id="trajGrid"></div></div>
    <div><div class="sec-lbl">기타 결과 <span style="font-size:9px;font-weight:400;text-transform:none">(즉시 기록)</span></div><div class="nh-grid" id="nhGrid"></div></div>
    <div class="log-wrap">
      <div class="sec-lbl">타석 기록</div>
      <div class="log-acts">
        <button class="sb-btn" onclick="undo()" style="font-size:11px">↩ 취소</button>
        <button class="sb-btn" onclick="clearAll()" style="font-size:11px;color:var(--red);border-color:var(--red)">전체삭제</button>
      </div>
      <div class="log-scr" id="logScr"></div>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div id="canvasTip"></div>

<!-- Stats Modal -->
<div class="overlay" id="statsModal">
  <div class="modal">
    <div class="m-hdr">
      <h3 id="mTitle"></h3>
      <button class="sb-btn" onclick="chgSB(-1)">− 도루</button>
      <button class="sb-btn" onclick="chgSB(1)" style="margin-right:4px">+ 도루</button>
      <button class="m-close" onclick="closeStats()">✕</button>
    </div>
    <div class="m-tabs">
      <button class="t-tab on" onclick="switchTab(0)">📊 통계</button>
      <button class="t-tab" onclick="switchTab(1)">📋 타석기록</button>
      <button class="t-tab" onclick="switchTab(2)">📈 분석</button>
    </div>
    <div class="m-body" id="mBody"></div>
  </div>
</div>

<!-- Load Modal -->
<div class="overlay" id="loadModal">
  <div class="modal" style="width:460px">
    <div class="m-hdr"><h3 style="flex:1">저장된 게임 불러오기</h3><button class="m-close" onclick="closeLoad()">✕</button></div>
    <div class="m-body"><div class="load-list" id="loadList"></div></div>
  </div>
</div>

<script>
// ===== DATA =====
const PITCHES=[{n:'직구',c:'#FF5555'},{n:'커브',c:'#5588FF'},{n:'슬라이더',c:'#AA55FF'},{n:'체인지업',c:'#44CC66'},{n:'포크',c:'#FF9944'},{n:'너클',c:'#AAAAAA'},{n:'팜볼',c:'#FFCC44'},{n:'스플리터',c:'#AA7744'},{n:'싱커',c:'#44AACC'}];
const ZONES=['높내','높중','높외','중내','중중','중외','낮내','낮중','낮외'];
const ZONE_ROW=['높음','중간','낮음'];
const HITS=[{k:'single',l:'단타',c:'#44CC66'},{k:'double',l:'2루타',c:'#5588FF'},{k:'triple',l:'3루타',c:'#FFCC44'},{k:'homer',l:'홈런',c:'#FF5555'}];
const NONHITS=[{k:'K',l:'삼진K',c:'#f85149'},{k:'BB',l:'볼넷',c:'#58a6ff'},{k:'HBP',l:'사구',c:'#a371f7'},{k:'OUT',l:'범타',c:'#8b949e'},{k:'SF',l:'희비',c:'#e3b341'},{k:'SAC',l:'희번',c:'#d29922'}];
const TRAJS=[{k:'GB',l:'땅볼',c:'#c8956a'},{k:'LD',l:'라인드라이브',c:'#44CC66'},{k:'FB',l:'플라이볼',c:'#5588FF'},{k:'PU',l:'팝업',c:'#8b949e'}];
const OC={single:'#44CC66',double:'#5588FF',triple:'#FFCC44',homer:'#FF5555',K:'#f85149',BB:'#58a6ff',HBP:'#a371f7',OUT:'#8b949e',SF:'#e3b341',SAC:'#d29922'};
const OK={single:'단타',double:'2루타',triple:'3루타',homer:'홈런',K:'삼진',BB:'볼넷',HBP:'사구',OUT:'범타',SF:'희비',SAC:'희번'};
const TC=['#58a6ff','#f0883e'];
const SK='bsc_v5';
const CW=480,CH=480,HX=240,HY=440;

// ===== STATE =====
let tNames=['팀 A','팀 B'],tRuns=[0,0],gDate='';
let lineup=[Array.from({length:9},(_,i)=>({name:`타자${i+1}`,hand:'R',sb:0})),Array.from({length:9},(_,i)=>({name:`타자${i+1}`,hand:'R',sb:0}))];
let pas=[],nid=1;
let selTeam=0,selBat=0,selPitch=null,selZone=-1,selHit=null,selTraj=null;
let pending=false,pX=null,pY=null,pRBI=0;
let mTeam=0,mBat=0,mTab=0,showHM=false,hoverPA=null;
let newMarkerPos=null,newMarkerTimer=null;

function init(){
  const d=new Date();document.getElementById('gameDate').value=d.toISOString().slice(0,10);gDate=d.toISOString().slice(0,10);
  document.getElementById('gameDate').addEventListener('change',e=>{gDate=e.target.value;draw();});
  document.getElementById('teamNameA').addEventListener('input',e=>{tNames[0]=e.target.value;syncHdr(0);draw();});
  document.getElementById('teamNameB').addEventListener('input',e=>{tNames[1]=e.target.value;syncHdr(1);draw();});
  buildAll();buildLegend();
  const cv=document.getElementById('fieldCanvas');
  cv.addEventListener('click',onCvClick);
  cv.addEventListener('mousemove',onCvHover);
  cv.addEventListener('mouseleave',()=>{hoverPA=null;hideTooltip();draw();});
  cv.addEventListener('touchend',e=>{e.preventDefault();if(!pending)return;const t=e.changedTouches[0];const r=cv.getBoundingClientRect();placeHit((t.clientX-r.left)*(CW/r.width),(t.clientY-r.top)*(CH/r.height));},{passive:false});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')cancelPending();});
  draw();renderLog();
}

function buildAll(){buildPitches();buildZones();buildHits();buildTrajs();buildNH();buildLineup();}

function buildPitches(){
  const g=document.getElementById('pitchGrid');g.innerHTML='';
  PITCHES.forEach((p,i)=>{const b=document.createElement('button');b.className='p-btn';b.textContent=p.n;b.dataset.i=i;stylePitch(b,i,false);b.onclick=()=>selPitchF(i);g.appendChild(b);});
}
function stylePitch(b,i,on){const c=PITCHES[i].c;b.style.background=on?c+'55':c+'18';b.style.color=c;b.style.borderColor=on?c:'transparent';b.style.boxShadow=on?`0 0 8px ${c}55`:'';}
function buildZones(){
  const g=document.getElementById('zoneGrid');g.innerHTML='';
  ZONES.forEach((z,i)=>{const c=document.createElement('div');c.className='z-cell';c.dataset.z=i;const r=Math.floor(i/3);c.innerHTML=`<div style="font-size:8px;color:#444;line-height:1">${ZONE_ROW[r]}</div><div>${i+1}</div>`;c.onclick=()=>selZoneF(i);g.appendChild(c);});
}
function buildHits(){
  const g=document.getElementById('hitGrid');g.innerHTML='';
  HITS.forEach(h=>{const b=document.createElement('button');b.className='h-btn';b.textContent=h.l;b.dataset.k=h.k;b.style.background=h.c+'20';b.style.color=h.c;b.style.borderColor='transparent';b.onclick=()=>selHitF(h.k);g.appendChild(b);});
}
function buildTrajs(){
  const g=document.getElementById('trajGrid');g.innerHTML='';
  TRAJS.forEach(t=>{const b=document.createElement('button');b.className='t-btn';b.textContent=t.l;b.dataset.k=t.k;b.style.background=t.c+'20';b.style.color=t.c;b.style.borderColor='transparent';b.onclick=()=>selTrajF(t.k);g.appendChild(b);});
}
function buildNH(){
  const g=document.getElementById('nhGrid');g.innerHTML='';
  NONHITS.forEach(n=>{const b=document.createElement('button');b.className='nh-btn';b.textContent=n.l;b.style.color=n.c;b.onclick=()=>recNH(n.k);g.appendChild(b);});
}
function buildLegend(){
  const g=document.getElementById('legend');g.innerHTML='';
  [...HITS,...NONHITS.slice(0,3)].forEach(item=>{
    const d=document.createElement('div');d.className='leg-item';
    d.innerHTML=`<div class="leg-dot" style="background:${item.c}"></div><span>${item.l||item.label}</span>`;
    g.appendChild(d);
  });
}
function buildLineup(){
  const p=document.getElementById('leftPanel');p.innerHTML='';
  [0,1].forEach(t=>{
    const hd=document.createElement('div');hd.className='team-hdr';
    hd.innerHTML=`<span style="color:${TC[t]}">${t===0?'▲':'▼'}</span>`;
    const ni=document.createElement('input');ni.type='text';ni.value=tNames[t];ni.className='batter-inp';ni.style.cssText=`font-weight:700;color:${TC[t]};width:95px`;ni.dataset.th=t;
    ni.addEventListener('input',e=>{tNames[t]=e.target.value;document.getElementById(t===0?'teamNameA':'teamNameB').value=e.target.value;draw();});
    ni.addEventListener('click',e=>e.stopPropagation());hd.appendChild(ni);p.appendChild(hd);
    for(let i=0;i<9;i++){
      const row=document.createElement('div');row.className='batter-row'+(t===selTeam&&i===selBat?' active':'');row.dataset.t=t;row.dataset.b=i;
      const num=document.createElement('span');num.className='batter-num';num.textContent=i+1;
      const inp=document.createElement('input');inp.type='text';inp.className='batter-inp';inp.value=lineup[t][i].name;inp.placeholder=`타자${i+1}`;
      inp.addEventListener('input',e=>{lineup[t][i].name=e.target.value;if(t===mTeam&&i===mBat)updMHdr();renderLog();draw();});
      inp.addEventListener('click',e=>e.stopPropagation());
      const hb=document.createElement('button');hb.className='hand-btn '+(lineup[t][i].hand==='L'?'L':'R');hb.textContent=lineup[t][i].hand==='L'?'좌타':'우타';
      hb.addEventListener('click',e=>{e.stopPropagation();lineup[t][i].hand=lineup[t][i].hand==='L'?'R':'L';hb.className='hand-btn '+(lineup[t][i].hand==='L'?'L':'R');hb.textContent=lineup[t][i].hand==='L'?'좌타':'우타';draw();});
      row.appendChild(num);row.appendChild(inp);row.appendChild(hb);
      row.addEventListener('click',()=>{selTeam=t;selBat=i;updActive();updBatterInfo();draw();openStats(t,i);});
      p.appendChild(row);
    }
  });
}
function syncHdr(t){const i=document.querySelector(`input[data-th="${t}"]`);if(i)i.value=tNames[t];}
function updActive(){document.querySelectorAll('.batter-row').forEach(r=>r.classList.toggle('active',parseInt(r.dataset.t)===selTeam&&parseInt(r.dataset.b)===selBat));}
function updBatterInfo(){
  const b=lineup[selTeam][selBat];const el=document.getElementById('curBatterInfo');
  const hc=b.hand==='L'?'#44cc66':'#ff5555';
  el.innerHTML=`<span style="color:${TC[selTeam]};font-weight:700">${tNames[selTeam]}</span> · ${selBat+1}번 타자<br><strong style="font-size:13px">${b.name||`타자${selBat+1}`}</strong> <span style="color:${hc};font-size:10px">${b.hand==='L'?'좌타':'우타'}</span>`;
}

// ===== SELECTIONS =====
function selPitchF(i){selPitch=i;document.querySelectorAll('.p-btn').forEach((b,j)=>stylePitch(b,j,j===i));}
function selZoneF(i){selZone=selZone===i?-1:i;document.querySelectorAll('.z-cell').forEach((c,j)=>c.classList.toggle('on',j===selZone));}
function clearZone(){selZone=-1;document.querySelectorAll('.z-cell').forEach(c=>c.classList.remove('on'));}
function selTrajF(k){
  selTraj=selTraj===k?null:k;
  document.querySelectorAll('.t-btn').forEach(b=>{const tt=TRAJS.find(t=>t.k===b.dataset.k);const on=b.dataset.k===selTraj;b.style.borderColor=on?tt.c:'transparent';b.style.background=on?tt.c+'40':tt.c+'20';b.style.boxShadow=on?`0 0 6px ${tt.c}66`:'';});
}
function selHitF(k){
  if(pending&&selHit===k){cancelPending();return;}
  selHit=k;pending=true;
  document.querySelectorAll('.h-btn').forEach(b=>{const h=HITS.find(x=>x.k===b.dataset.k);const on=b.dataset.k===k;b.style.borderColor=on?'#fff':'transparent';b.style.boxShadow=on?'0 0 8px rgba(255,255,255,0.3)':'';b.style.background=on?h.c+'40':h.c+'20';});
  setSt(`${HITS.find(h=>h.k===k).l} 위치를 필드에서 클릭하세요`,true);
}

// ===== RECORDING =====
function onCvClick(e){if(!pending)return;const r=e.target.getBoundingClientRect();placeHit((e.clientX-r.left)*(CW/r.width),(e.clientY-r.top)*(CH/r.height));}
function placeHit(x,y){pX=x;pY=y;pRBI=0;document.getElementById('rbiV').textContent='0';document.getElementById('runChk').checked=false;document.getElementById('rbiBar').classList.add('on');setSt('위치 선택됨 · 타점/득점 확인 후 기록 확인',false);draw();}
function chgRBI(d){pRBI=Math.max(0,pRBI+d);document.getElementById('rbiV').textContent=pRBI;}
function confirmHit(){
  if(!pending||pX===null)return;
  const pa=mkPA(selHit,pX,pY,pRBI,document.getElementById('runChk').checked);
  pas.push(pa);
  newMarkerPos={x:pX,y:pY};
  if(newMarkerTimer)clearTimeout(newMarkerTimer);
  newMarkerTimer=setTimeout(()=>{newMarkerPos=null;draw();},400);
  resetPending();renderLog();draw();
}
function recNH(k){pas.push(mkPA(k,null,null,0,false));renderLog();draw();}
function mkPA(outcome,x,y,rbi,run){return{id:nid++,teamIdx:selTeam,batIdx:selBat,batName:lineup[selTeam][selBat].name||`타자${selBat+1}`,batHand:lineup[selTeam][selBat].hand,pitch:selPitch,zone:selZone,traj:selTraj,outcome,x,y,rbi,run};}
function cancelPending(){resetPending();draw();}
function resetPending(){
  pending=false;pX=null;pY=null;selHit=null;
  document.getElementById('rbiBar').classList.remove('on');
  document.querySelectorAll('.h-btn').forEach(b=>{const h=HITS.find(x=>x.k===b.dataset.k);b.style.borderColor='transparent';b.style.boxShadow='';b.style.background=h.c+'20';});
  setSt('타구 유형을 선택하세요',false);
}
function setSt(msg,hot){const el=document.getElementById('status');el.textContent=msg;el.classList.toggle('hot',hot);}
function chgScore(t,d){tRuns[t]=Math.max(0,tRuns[t]+d);document.getElementById(t===0?'scoreA':'scoreB').textContent=tRuns[t];}

// ===== HOVER TOOLTIP =====
function onCvHover(e){
  if(pending)return;
  const r=e.target.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(CW/r.width),my=(e.clientY-r.top)*(CH/r.height);
  const hitPAs=pas.filter(p=>p.x!==null);
  let nearest=null,minD=16;
  hitPAs.forEach(pa=>{const d=Math.hypot(pa.x-mx,pa.y-my);if(d<minD){minD=d;nearest=pa;}});
  if(nearest!==hoverPA){hoverPA=nearest;draw();if(nearest)showTooltip(nearest,e.clientX,e.clientY);else hideTooltip();}
  else if(nearest)moveTooltip(e.clientX,e.clientY);
}
function showTooltip(pa,cx,cy){
  const tip=document.getElementById('canvasTip');
  const pn=pa.pitch!==null?PITCHES[pa.pitch].n:'—';
  const zn=pa.zone>=0?ZONES[pa.zone]:'—';
  const tt=pa.traj?TRAJS.find(t=>t.k===pa.traj):null;
  tip.innerHTML=`<span style="color:${OC[pa.outcome]};font-weight:700">${OK[pa.outcome]}</span><br>타자: ${pa.batName}<br>투구: ${pn}<br>존: ${zn}<br>궤적: ${tt?`<span style="color:${tt.c}">${tt.l}</span>`:'—'}<br>타점: ${pa.rbi} / 득점: ${pa.run?'✓':'—'}`;
  tip.style.display='block';moveTooltip(cx,cy);
}
function moveTooltip(cx,cy){
  const tip=document.getElementById('canvasTip');
  tip.style.left=(cx+14)+'px';tip.style.top=(cy-10)+'px';
}
function hideTooltip(){document.getElementById('canvasTip').style.display='none';}

// ===== LOG =====
function renderLog(){
  const el=document.getElementById('logScr');
  if(pas.length===0){el.innerHTML='<div class="log-empty">기록된 타석이 없습니다</div>';return;}
  el.innerHTML='';
  [...pas].reverse().forEach(pa=>{
    const div=document.createElement('div');div.className='log-row';
    const oc=OC[pa.outcome]||'#8b949e';const pc=pa.pitch!==null?PITCHES[pa.pitch].c:'#8b949e';const pn=pa.pitch!==null?PITCHES[pa.pitch].n:'—';const tc=TC[pa.teamIdx];
    const tt=pa.traj?TRAJS.find(t=>t.k===pa.traj):null;
    div.innerHTML=`<span style="color:${tc};font-size:10px;flex-shrink:0">${pa.batIdx+1}</span><span style="color:${tc};font-size:10px;max-width:32px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0">${pa.batName}</span><span class="log-tag" style="background:${oc}25;color:${oc}">${OK[pa.outcome]}</span><span style="color:${pc};font-size:10px;flex-shrink:0">${pn}</span>${tt?`<span style="font-size:9px;color:${tt.c};flex-shrink:0">${tt.k}</span>`:''} ${pa.rbi>0?`<span style="font-size:10px;color:#e3b341;flex-shrink:0">타${pa.rbi}</span>`:''} ${pa.run?'<span style="font-size:10px;color:#44CC66;flex-shrink:0">득</span>':''}<button class="log-del" onclick="delPA(${pa.id})">✕</button>`;
    el.appendChild(div);
  });
}
function delPA(id){pas=pas.filter(p=>p.id!==id);renderLog();draw();}
function undo(){if(pas.length>0){pas.pop();renderLog();draw();}}
function clearAll(){if(confirm('모든 타석 기록을 삭제하시겠습니까?')){pas=[];renderLog();draw();}}

// ===== HEATMAP =====
function toggleHM(){showHM=!showHM;document.getElementById('hmBtn').classList.toggle('on',showHM);draw();}
function drawHM(ctx){
  const hp=pas.filter(p=>p.x!==null);if(!hp.length)return;
  ctx.save();
  hp.forEach(pa=>{const r=60;const oc=OC[pa.outcome]||'#ff5555';const g=ctx.createRadialGradient(pa.x,pa.y,0,pa.x,pa.y,r);g.addColorStop(0,oc+'aa');g.addColorStop(0.4,oc+'44');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(pa.x,pa.y,r,0,Math.PI*2);ctx.fill();});
  ctx.restore();
}

// ===== STATS =====
function calcStats(ti,bi){
  const my=pas.filter(p=>p.teamIdx===ti&&p.batIdx===bi);
  const PA=my.length,BB=my.filter(p=>p.outcome==='BB').length,HBP=my.filter(p=>p.outcome==='HBP').length;
  const SF=my.filter(p=>p.outcome==='SF').length,SAC=my.filter(p=>p.outcome==='SAC').length,K=my.filter(p=>p.outcome==='K').length;
  const s1=my.filter(p=>p.outcome==='single').length,s2=my.filter(p=>p.outcome==='double').length;
  const s3=my.filter(p=>p.outcome==='triple').length,HR=my.filter(p=>p.outcome==='homer').length;
  const H=s1+s2+s3+HR,AB=PA-BB-HBP-SF-SAC;
  const RBI=my.reduce((s,p)=>s+(p.rbi||0),0),R=my.filter(p=>p.run).length,SB=lineup[ti][bi].sb||0;
  const AVG=AB>0?H/AB:0,OBP=(AB+BB+HBP+SF)>0?(H+BB+HBP)/(AB+BB+HBP+SF):0;
  const SLG=AB>0?(s1+2*s2+3*s3+4*HR)/AB:0,OPS=OBP+SLG,IsoP=SLG-AVG;
  const bd=AB-K-HR+SF,BABIP=bd>0?(H-HR)/bd:0;
  const wOBA=PA>0?(0.69*BB+0.72*HBP+0.888*s1+1.271*s2+1.616*s3+2.101*HR)/PA:0;
  const wRCp=Math.round(((wOBA-0.32)/1.21+0.115)/0.115*100);
  const rv=s1*0.47+s2*0.78+s3*1.09+HR*1.40+BB*0.33+HBP*0.33-(AB-H-K)*0.27-K*0.30;
  const WPA=PA>0?+(rv/10).toFixed(2):0;
  const WAR=+(((wOBA-0.32)/1.21*AB+0.0333*AB)/10).toFixed(1);
  return{PA,AB,H,s1,s2,s3,HR,BB,HBP,K,SF,SAC,RBI,R,SB,AVG,OBP,SLG,OPS,IsoP,BABIP,wOBA,wRCp,WPA,WAR,myPAs:my};
}
function getDir(pa){if(pa.x===null)return null;const a=Math.atan2(pa.x-CW/2,HY-pa.y)*180/Math.PI;return pa.batHand==='R'?(a<-15?'pull':a>15?'oppo':'center'):(a>15?'pull':a<-15?'oppo':'center');}
function calcAn(myPAs){
  const wl=myPAs.filter(p=>p.x!==null);const tot=wl.length||1;
  const pull=wl.filter(p=>getDir(p)==='pull').length,cen=wl.filter(p=>getDir(p)==='center').length,opp=wl.filter(p=>getDir(p)==='oppo').length;
  const wt=myPAs.filter(p=>p.traj);const totT=wt.length||1;
  const GB=wt.filter(p=>p.traj==='GB').length,LD=wt.filter(p=>p.traj==='LD').length,FB=wt.filter(p=>p.traj==='FB').length,PU=wt.filter(p=>p.traj==='PU').length;
  const lf=wl.filter(p=>Math.atan2(p.x-CW/2,HY-p.y)*180/Math.PI<-15).length;
  const rf=wl.filter(p=>Math.atan2(p.x-CW/2,HY-p.y)*180/Math.PI>15).length;
  return{pp:r(pull/tot*100),cp:r(cen/tot*100),op:r(opp/tot*100),GBp:r(GB/totT*100),LDp:r(LD/totT*100),FBp:r(FB/totT*100),PUp:r(PU/totT*100),lfp:r(lf/tot*100),cfp:r((wl.length-lf-rf)/tot*100),rfp:r(rf/tot*100),twl:wl.length,twt:wt.length};
}
function r(v){return Math.round(v);}
function f3(v){if(isNaN(v)||!isFinite(v))return'.000';const s=v.toFixed(3);return s.startsWith('0.')?s.slice(1):(s.startsWith('-0.')?'-'+s.slice(2):s);}
function getLoc(pa){if(pa.x===null)return'—';const dx=pa.x-CW/2,dy=HY-pa.y,dist=Math.hypot(dx,dy),a=Math.atan2(dx,dy)*180/Math.PI;if(dist<85)return'내야';if(a<-45)return'좌익수';if(a<-15)return'좌중간';if(a<15)return'중견수';if(a<45)return'우중간';return'우익수';}

// ===== MODAL =====
function openStats(t,i){mTeam=t;mBat=i;mTab=0;document.querySelectorAll('.t-tab').forEach((b,j)=>b.classList.toggle('on',j===0));updMHdr();renderM();document.getElementById('statsModal').classList.add('on');}
function updMHdr(){const b=lineup[mTeam][mBat];document.getElementById('mTitle').innerHTML=`<span style="color:${TC[mTeam]}">${b.name||`타자${mBat+1}`}</span> <span style="font-size:11px;color:var(--muted);font-weight:400">${mBat+1}번 · ${tNames[mTeam]} · ${b.hand==='L'?'좌타':'우타'} · 도루 ${b.sb||0}</span>`;}
function closeStats(){document.getElementById('statsModal').classList.remove('on');}
function switchTab(i){mTab=i;document.querySelectorAll('.t-tab').forEach((b,j)=>b.classList.toggle('on',j===i));renderM();}
function chgSB(d){lineup[mTeam][mBat].sb=Math.max(0,(lineup[mTeam][mBat].sb||0)+d);updMHdr();if(mTab===0)renderM();}
function renderM(){
  const body=document.getElementById('mBody');const st=calcStats(mTeam,mBat);
  if(mTab===0){
    const cards=[{l:'타율',v:f3(st.AVG)},{l:'경기',v:st.PA>0?1:0},{l:'타수',v:st.AB},{l:'안타',v:st.H},{l:'홈런',v:st.HR},{l:'2루타',v:st.s2},{l:'3루타',v:st.s3},{l:'타점',v:st.RBI},{l:'득점',v:st.R},{l:'도루',v:st.SB},{l:'볼넷',v:st.BB},{l:'사구',v:st.HBP},{l:'삼진',v:st.K},{l:'출루율',v:f3(st.OBP)},{l:'장타율',v:f3(st.SLG)},{l:'OPS',v:f3(st.OPS)},{l:'IsoP',v:f3(st.IsoP)},{l:'BABIP',v:f3(st.BABIP)},{l:'wOBA',v:f3(st.wOBA)},{l:'wRC+',v:isFinite(st.wRCp)?st.wRCp:'—'},{l:'WPA',v:isFinite(st.WPA)?st.WPA:'—'},{l:'WAR',v:isFinite(st.WAR)?st.WAR:'—'}];
    body.innerHTML=`<div class="stat-grid">${cards.map(c=>`<div class="s-card"><div class="sl">${c.l}</div><div class="sv">${c.v}</div></div>`).join('')}</div>`;
  }else if(mTab===1){
    const rows=st.myPAs.map((pa,i)=>{const oc=OC[pa.outcome]||'#8b949e';const pc=pa.pitch!==null?PITCHES[pa.pitch].c:'#8b949e';const pn=pa.pitch!==null?PITCHES[pa.pitch].n:'—';const zn=pa.zone>=0?ZONES[pa.zone]:'—';const tt=pa.traj?TRAJS.find(t=>t.k===pa.traj):null;return`<tr><td>${i+1}</td><td style="color:${oc};font-weight:700">${OK[pa.outcome]}</td><td style="color:${pc}">${pn}</td><td>${zn}</td><td>${tt?`<span style="color:${tt.c}">${tt.l}</span>`:'—'}</td><td>${pa.rbi}</td><td>${pa.run?'✓':''}</td><td>${getLoc(pa)}</td></tr>`;}).join('');
    body.innerHTML=`<table class="pa-tbl"><thead><tr><th>#</th><th>결과</th><th>투구</th><th>존</th><th>궤적</th><th>타점</th><th>득점</th><th>구역</th></tr></thead><tbody>${rows||'<tr><td colspan="8" style="color:var(--muted);padding:14px;text-align:center">기록 없음</td></tr>'}</tbody></table>`;
  }else{
    const an=calcAn(st.myPAs);const hand=lineup[mTeam][mBat].hand;
    const br=(l,pct,c)=>`<div class="bar-row"><span class="bar-lbl">${l}</span><div class="bar-trk"><div class="bar-fill" style="width:${pct}%;background:${c}"></div></div><span class="bar-pct" style="color:${c}">${pct}%</span></div>`;
    const ins=[];
    if(an.twl>=3){if(an.pp>=50)ins.push({t:'당김 성향 (Pull Hitter)',c:'#58a6ff'});else if(an.op>=40)ins.push({t:'밀어치기 성향 (Oppo Hitter)',c:'#f0883e'});else ins.push({t:'균형 잡힌 타자 (All-Field)',c:'#44CC66'});}
    if(an.twt>=3){if(an.GBp>=50)ins.push({t:'땅볼형 타자 (GB↑)',c:'#c8956a'});else if(an.FBp>=50)ins.push({t:'플라이볼형 타자 (FB↑)',c:'#5588FF'});else if(an.LDp>=35)ins.push({t:'라인드라이브형 (LD↑)',c:'#44CC66'});}
    if(st.PA>=3){const kp=r(st.K/st.PA*100),bbp=r((st.BB+st.HBP)/st.PA*100);if(kp>=30)ins.push({t:`삼진 ${kp}% 주의`,c:'#f85149'});if(bbp>=15)ins.push({t:`볼넷+사구 ${bbp}% (좋은 선구안)`,c:'#58a6ff'});}
    body.innerHTML=`
      ${ins.length?`<div class="an-sec"><div class="an-ttl">🔍 인사이트</div><div class="ins-box">${ins.map(x=>`<span class="ins-tag" style="background:${x.c}25;color:${x.c};border:1px solid ${x.c}44">${x.t}</span>`).join('')}</div></div>`:''}
      <div class="an-sec"><div class="an-ttl">방향 분포 <span style="font-size:9px;font-weight:400;text-transform:none;color:#444">${an.twl}타구 · ${hand==='R'?'우타':'좌타'}</span></div>${br('당김 (Pull)',an.pp,'#58a6ff')}${br('중앙 (Center)',an.cp,'#44CC66')}${br('밀어치기 (Oppo)',an.op,'#f0883e')}</div>
      <div class="an-sec"><div class="an-ttl">타구 궤적 <span style="font-size:9px;font-weight:400;text-transform:none;color:#444">${an.twt}타구</span></div>${br('땅볼 (GB)',an.GBp,'#c8956a')}${br('라인드라이브 (LD)',an.LDp,'#44CC66')}${br('플라이볼 (FB)',an.FBp,'#5588FF')}${br('팝업 (PU)',an.PUp,'#8b949e')}</div>
      <div class="an-sec"><div class="an-ttl">구역 분포</div>${br('좌측',an.lfp,'#FF5555')}${br('중앙',an.cfp,'#FFCC44')}${br('우측',an.rfp,'#44CC66')}</div>
      <div class="an-sec"><div class="an-ttl">타석 결과 <span style="font-size:9px;font-weight:400;text-transform:none;color:#444">${st.PA}타석</span></div>${br('안타',st.PA>0?r(st.H/st.PA*100):0,'#44CC66')}${br('삼진',st.PA>0?r(st.K/st.PA*100):0,'#f85149')}${br('볼넷+사구',st.PA>0?r((st.BB+st.HBP)/st.PA*100):0,'#58a6ff')}${br('범타+기타',st.PA>0?r((st.PA-st.H-st.K-st.BB-st.HBP)/st.PA*100):0,'#8b949e')}</div>`;
  }
}

// ===== DRAW =====
function draw(){
  const cv=document.getElementById('fieldCanvas');const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,CW,CH);const hp={x:HX,y:HY};
  // BG
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,CW,CH);
  // Fair territory
  ctx.save();ctx.beginPath();ctx.moveTo(hp.x,hp.y);ctx.arc(hp.x,hp.y,385,-Math.PI*0.86,-Math.PI*0.14);ctx.closePath();ctx.fillStyle='#162a16';ctx.fill();ctx.restore();
  // Pull/Oppo zones (subtle)
  ctx.save();ctx.globalAlpha=0.07;
  ctx.beginPath();ctx.moveTo(hp.x,hp.y);ctx.arc(hp.x,hp.y,340,-Math.PI*0.86,-Math.PI*0.5);ctx.closePath();ctx.fillStyle='#58a6ff';ctx.fill();
  ctx.beginPath();ctx.moveTo(hp.x,hp.y);ctx.arc(hp.x,hp.y,340,-Math.PI*0.5,-Math.PI*0.14);ctx.closePath();ctx.fillStyle='#f0883e';ctx.fill();
  ctx.globalAlpha=1;ctx.restore();
  // Zone labels
  ctx.save();ctx.font='bold 9px sans-serif';ctx.fillStyle='#58a6ff33';ctx.textAlign='center';ctx.fillText('PULL',hp.x-190,hp.y-80);ctx.fillStyle='#f0883e33';ctx.fillText('OPPO',hp.x+190,hp.y-80);ctx.restore();
  // Foul lines
  ctx.save();ctx.strokeStyle='#ffffff44';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(hp.x,hp.y);ctx.lineTo(hp.x-342,hp.y-342);ctx.moveTo(hp.x,hp.y);ctx.lineTo(hp.x+342,hp.y-342);ctx.stroke();ctx.restore();
  // Outfield wall
  ctx.save();ctx.beginPath();ctx.arc(hp.x,hp.y,340,-Math.PI*0.86,-Math.PI*0.14);ctx.strokeStyle='#aaaaaa77';ctx.lineWidth=2.5;ctx.stroke();ctx.restore();
  // Infield grass
  ctx.save();ctx.beginPath();ctx.arc(hp.x,hp.y-8,135,0,Math.PI*2);ctx.fillStyle='#1e3e1e';ctx.fill();ctx.restore();
  // Dirt diamond
  ctx.save();ctx.translate(hp.x,hp.y-8);ctx.rotate(Math.PI/4);ctx.fillStyle='#2a1c10';ctx.fillRect(-63,-63,126,126);ctx.restore();
  // Base dirt
  [{bx:92,by:-92},{bx:0,by:-184},{bx:-92,by:-92}].forEach(b=>{ctx.save();ctx.beginPath();ctx.arc(hp.x+b.bx,hp.y+b.by,17,0,Math.PI*2);ctx.fillStyle='#382010';ctx.fill();ctx.restore();});
  // Bases
  const db=(bx,by)=>{ctx.save();ctx.translate(hp.x+bx,hp.y+by);ctx.rotate(Math.PI/4);ctx.fillStyle='#eeeee0';ctx.shadowColor='#ffffff55';ctx.shadowBlur=5;ctx.fillRect(-6,-6,12,12);ctx.restore();};
  db(92,-92);db(0,-184);db(-92,-92);
  // Home plate
  ctx.save();ctx.translate(hp.x,hp.y);ctx.beginPath();ctx.moveTo(-10,-8);ctx.lineTo(10,-8);ctx.lineTo(13,4);ctx.lineTo(0,12);ctx.lineTo(-13,4);ctx.closePath();ctx.fillStyle='#fff';ctx.shadowColor='#ffffff88';ctx.shadowBlur=6;ctx.fill();ctx.restore();
  // Mound
  ctx.save();ctx.beginPath();ctx.arc(hp.x,hp.y-108,9,0,Math.PI*2);ctx.fillStyle='#4a3010';ctx.strokeStyle='#6a5030';ctx.lineWidth=1;ctx.fill();ctx.stroke();ctx.restore();
  // Field labels
  ctx.save();ctx.font='bold 11px sans-serif';ctx.fillStyle='#ffffff33';ctx.textAlign='center';ctx.fillText('중견수',hp.x,hp.y-308);ctx.fillText('좌중간',hp.x-158,hp.y-242);ctx.fillText('우중간',hp.x+158,hp.y-242);ctx.fillText('좌익수',hp.x-248,hp.y-148);ctx.fillText('우익수',hp.x+248,hp.y-148);ctx.restore();
  // Title
  ctx.save();ctx.font='11px sans-serif';ctx.fillStyle='#8b949e';ctx.textAlign='center';ctx.fillText(`${tNames[0]||'팀 A'} vs ${tNames[1]||'팀 B'}  ·  ${gDate||''}`,CW/2,15);ctx.restore();
  // Batter box
  const cb=lineup[selTeam][selBat];const xo=cb.hand==='L'?-30:18;
  ctx.save();ctx.strokeStyle=TC[selTeam]+'88';ctx.lineWidth=1.2;ctx.setLineDash([3,3]);ctx.strokeRect(hp.x+xo,hp.y-22,14,22);ctx.restore();
  // Heatmap
  if(showHM)drawHM(ctx);
  // Markers
  pas.forEach(pa=>{if(pa.x===null)return;drawMarker(ctx,pa,hp);});
  // Pending preview
  if(pending&&pX!==null){
    ctx.save();ctx.beginPath();ctx.arc(pX,pY,12,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.12)';ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.moveTo(hp.x,hp.y);ctx.lineTo(pX,pY);ctx.strokeStyle='#ffffff33';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.restore();
  }
}

function drawMarker(ctx,pa,hp){
  const ptC=pa.pitch!==null?PITCHES[pa.pitch].c:'#aaa';
  const outC=OC[pa.outcome]||'#aaa';const teamC=TC[pa.teamIdx];
  const px=pa.x,py=pa.y;const isNew=newMarkerPos&&Math.hypot(px-newMarkerPos.x,py-newMarkerPos.y)<2;
  const isHov=hoverPA===pa;
  // Line
  ctx.save();ctx.beginPath();ctx.moveTo(hp.x,hp.y);ctx.lineTo(px,py);ctx.strokeStyle=ptC+(isHov?'dd':'77');ctx.lineWidth=isHov?2:1.5;ctx.setLineDash([4,3]);ctx.stroke();ctx.restore();
  // Arrow
  const ang=Math.atan2(py-hp.y,px-hp.x);
  ctx.save();ctx.translate(px,py);ctx.rotate(ang);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-9,-4);ctx.lineTo(-9,4);ctx.closePath();ctx.fillStyle=ptC;ctx.fill();ctx.restore();
  // Marker
  const sz=isHov?9:7;
  ctx.save();ctx.translate(px,py);
  if(isHov){ctx.shadowColor=outC;ctx.shadowBlur=12;}
  if(pa.teamIdx===0){ctx.beginPath();ctx.arc(0,0,sz,0,Math.PI*2);ctx.fillStyle=outC;ctx.strokeStyle=teamC;ctx.lineWidth=2;ctx.fill();ctx.stroke();}
  else{ctx.rotate(Math.PI/4);ctx.fillStyle=outC;ctx.strokeStyle=teamC;ctx.lineWidth=2;ctx.fillRect(-sz*.78,-sz*.78,sz*1.56,sz*1.56);ctx.strokeRect(-sz*.78,-sz*.78,sz*1.56,sz*1.56);}
  ctx.restore();
  // Traj label
  if(pa.traj){const tt=TRAJS.find(t=>t.k===pa.traj);ctx.save();ctx.translate(px,py-15);ctx.font='bold 8px sans-serif';ctx.fillStyle=tt.c;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(pa.traj,0,0);ctx.restore();}
  // Homer star
  if(pa.outcome==='homer'){ctx.save();ctx.translate(px,py-(pa.traj?25:16));ctx.font='13px sans-serif';ctx.fillStyle='#FFD700';ctx.textAlign='center';ctx.textBaseline='middle';if(isHov){ctx.shadowColor='#FFD700';ctx.shadowBlur=8;}ctx.fillText('★',0,0);ctx.restore();}
}

// ===== EXPORT =====
function expPNG(){
  const cv=document.getElementById('fieldCanvas');
  const url=cv.toDataURL('image/png');
  const a=document.createElement('a');a.href=url;a.download=`spray_chart_${gDate}.png`;a.click();
  showToast('이미지 저장 완료 📸');
}
function expCSV(){
  const h=['번호','팀','타자','결과','투구종류','투구위치','타구궤적','타점','득점','타구위치'];
  const rows=pas.map((pa,i)=>[i+1,tNames[pa.teamIdx],pa.batName,OK[pa.outcome],pa.pitch!==null?PITCHES[pa.pitch].n:'',pa.zone>=0?ZONES[pa.zone]:'',pa.traj||'',pa.rbi,pa.run?1:0,getLoc(pa)]);
  const csv=[h,...rows].map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`baseball_${gDate}.csv`;a.click();URL.revokeObjectURL(url);
  showToast('CSV 다운로드 완료');
}
function expJSON(){
  const blob=new Blob([JSON.stringify({gameDate:gDate,teamNames:tNames,teamRuns:tRuns,lineup,pas,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`baseball_${gDate}.json`;a.click();URL.revokeObjectURL(url);
  showToast('JSON 다운로드 완료');
}

// ===== SAVE/LOAD =====
function saveGame(){
  const all=getSaved();all.push({id:Date.now(),gameDate:document.getElementById('gameDate').value,teamNames:[...tNames],teamRuns:[...tRuns],lineup:JSON.parse(JSON.stringify(lineup)),pas:JSON.parse(JSON.stringify(pas)),nid,savedAt:new Date().toISOString()});
  try{localStorage.setItem(SK,JSON.stringify(all));showToast('저장 완료 ✅');}catch(e){showToast('저장 실패',true);}
}
function getSaved(){try{return JSON.parse(localStorage.getItem(SK)||'[]');}catch{return[];}}
function openLoad(){renderLoadList();document.getElementById('loadModal').classList.add('on');}
function closeLoad(){document.getElementById('loadModal').classList.remove('on');}
function renderLoadList(){
  const list=document.getElementById('loadList');const games=getSaved();
  if(!games.length){list.innerHTML='<div style="color:var(--muted);text-align:center;padding:20px">저장된 게임이 없습니다</div>';return;}
  list.innerHTML='';
  [...games].reverse().forEach(g=>{
    const hA=(g.pas||[]).filter(p=>p.teamIdx===0&&['single','double','triple','homer'].includes(p.outcome)).length;
    const hB=(g.pas||[]).filter(p=>p.teamIdx===1&&['single','double','triple','homer'].includes(p.outcome)).length;
    const div=document.createElement('div');div.className='load-item';
    div.innerHTML=`<div class="load-info"><div class="li-title"><span style="color:#58a6ff">${g.teamNames[0]}</span> <b style="color:#58a6ff">${g.teamRuns[0]}</b> : <b style="color:#f0883e">${g.teamRuns[1]}</b> <span style="color:#f0883e">${g.teamNames[1]}</span></div><div class="li-meta">${g.gameDate} · ${(g.pas||[]).length}타석 · A:${hA}H B:${hB}H · ${new Date(g.savedAt).toLocaleString('ko-KR')}</div></div><button class="btn-ld" onclick="loadGame(${g.id})">불러오기</button><button class="btn-dd" onclick="delSave(${g.id})">삭제</button>`;
    list.appendChild(div);
  });
}
function loadGame(id){
  const g=getSaved().find(x=>x.id===id);if(!g)return;
  tNames=[...(g.teamNames||['팀 A','팀 B'])];tRuns=[...(g.teamRuns||[0,0])];lineup=JSON.parse(JSON.stringify(g.lineup));pas=JSON.parse(JSON.stringify(g.pas||[]));nid=g.nid||(pas.length?Math.max(...pas.map(p=>p.id))+1:1);gDate=g.gameDate||'';
  document.getElementById('teamNameA').value=tNames[0];document.getElementById('teamNameB').value=tNames[1];document.getElementById('scoreA').textContent=tRuns[0];document.getElementById('scoreB').textContent=tRuns[1];document.getElementById('gameDate').value=gDate;
  selTeam=0;selBat=0;buildLineup();updBatterInfo();renderLog();draw();closeLoad();showToast('불러오기 완료');
}
function delSave(id){if(!confirm('삭제할까요?'))return;localStorage.setItem(SK,JSON.stringify(getSaved().filter(g=>g.id!==id)));renderLoadList();}
function showToast(msg,err){
  const t=document.createElement('div');t.textContent=msg;
  t.style.cssText=`position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:${err?'#8b1a1a':'#238636'};color:#fff;padding:9px 22px;border-radius:7px;z-index:9999;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.5);white-space:nowrap;animation:fadeIn 0.2s`;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}

init();
